repos:
  - repo: https://github.com/CMSgov/qpp-devops
    rev: pre-commit-v1.0.0  # DO NOT change without DevOps approval
    hooks:
      - id: qpp-baseline
        name: 'QPP DevOps Baseline'
        exclude: |
          (?x)^(
            path/to/large-model-file\.bin$|
            data/training-dataset\.zip$|
            assets/.*\.pdf$|
            staging/.+\.xlsx$
          )$

